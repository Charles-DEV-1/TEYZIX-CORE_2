services:
  - type: web
    name: customer-support-ticket-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: APP_CONFIG
        value: app.config.production.ProductionConfig
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: support-api-db
          property: connectionString

databases:
  - name: support-api-db
    databaseName: support_api
    user: support_api
